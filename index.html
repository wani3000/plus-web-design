<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Scroll Animation</title>
    <link rel="stylesheet" href="./style.css" />
  <body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
      <a href="/" class="nav-tab active">테스트1</a>
      <a href="/test2.html" class="nav-tab">테스트2</a>
      <a href="/test3.html" class="nav-tab">테스트3</a>

    <!-- Pinned Hero Section -->
    <section class="hero-pinned">
      <div class="gallery-container">

        <div class="image-wrapper img-01">

        <!-- Hero Title (Z-axis front) -->
        <h1 class="hero-title">앞서가는 부모들의<br>자산공식</h1>

        <div class="image-wrapper img-02">
          <img src="/06.png" alt="Image 06" />

        <div class="image-wrapper img-03">
          <img src="/02.png" alt="Image 02" />

        <!-- Right images (Top/Bottom) -->
        <div class="image-wrapper img-04">
          <img src="/03.jpg" alt="Image 03" />
        </div>
        <div class="image-wrapper img-05">
          <img src="/04.png" alt="Image 04" />
        </div>
      </div>
    </section>

    <!-- Subsequent Content Section -->
    <section class="content-below">
      <h2>Experience the Flow</h2>
      <p>Scroll back up to replay the animation sequence.</p>
    </section>

    <script type="module" src="./main.js"></script>
